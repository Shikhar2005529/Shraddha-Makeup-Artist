<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Shraddha Makeup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --red: #e74c3c; --green: #2ecc71; --orange: #f39c12; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/images/hero-bg.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        #loginBox { margin-top: 100px; background: white; padding: 40px; border-radius: 15px; width: 400px; text-align: center; }
        #dashboardContent { width: 95%; max-width: 1200px; background: rgba(255, 255, 255, 0.98); padding: 30px; border-radius: 15px; display: none; margin-top: 40px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--gold); color: white; padding: 12px; text-align: left; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        /* Status Colors */
        .status-pending { color: var(--orange); font-weight: bold; }
        .status-confirmed { color: var(--green); font-weight: bold; }
        .status-cancelled { color: var(--red); font-weight: bold; }

        /* Action Buttons Container */
        .action-cell { display: flex; gap: 8px; min-width: 180px; }
        .btn { border: none; padding: 8px 14px; border-radius: 5px; cursor: pointer; color: white; font-weight: 600; font-size: 0.8rem; transition: 0.2s; }
        .btn-confirm { background: var(--green); }
        .btn-cancel { background: var(--red); }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="loginBox">
        <h2 style="margin-bottom:20px;">Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Enter Password" style="width:100%; padding:10px; margin-bottom:20px; border-radius: 5px; border:1px solid #ccc;">
        <button onclick="checkPass()" style="width:100%; padding:12px; background:var(--gold); color:white; border:none; cursor:pointer; font-weight:600; border-radius: 5px;">LOGIN</button>
    </div>

    <div id="dashboardContent">
        <div class="dash-header">
            <h1>Booking <span>Dashboard</span></h1>
            <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:5px;">LOGOUT</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Phone</th>
                        <th>Service</th>
                        <th>Event Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookingsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('adminPass').value === "admin123") {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                fetchBookings();
            } else { alert("Bhai password galat hai!"); }
        }

        async function fetchBookings() {
            try {
                const res = await fetch('/api/admin/bookings');
                const data = await res.json();
                const table = document.getElementById('bookingsTable');
                table.innerHTML = '';
                
                data.forEach(booking => {
                    // Logic Update: Agar status null/undefined hai toh "Pending" dikhao
                    const currentStatus = booking.status || "Pending";
                    const statusClass = `status-${currentStatus.toLowerCase()}`;

                    let actionHTML = '';
                    // Agar status Pending hai toh Confirm/Cancel buttons dikhao
                    if(currentStatus === "Pending") {
                        actionHTML = `
                            <div class="action-cell">
                                <button class="btn btn-confirm" onclick="updateStatus('${booking._id}', 'confirm')">Confirm</button>
                                <button class="btn btn-cancel" onclick="updateStatus('${booking._id}', 'cancel')">Cancel</button>
                            </div>`;
                    } else {
                        actionHTML = `<span style="color:#999; font-style:italic;">No Action Needed</span>`;
                    }

                    table.innerHTML += `
                        <tr>
                            <td><strong>${booking.name}</strong></td>
                            <td>${booking.phone}</td>
                            <td>${booking.service}</td>
                            <td>${new Date(booking.date).toDateString()}</td>
                            <td class="${statusClass}">${currentStatus}</td>
                            <td>${actionHTML}</td>
                        </tr>`;
                });
            } catch (error) {
                console.error("Error fetching bookings:", error);
            }
        }

        async function updateStatus(id, type) {
            if(confirm(`Bhai, pakka booking ko ${type} karna hai?`)) {
                try {
                    const res = await fetch(`/api/admin/${type}/${id}`, { method: 'POST' });
                    if(res.ok) {
                        fetchBookings(); // Refresh table
                    } else {
                        alert("Bhai, update nahi ho paya!");
                    }
                } catch (err) {
                    console.error("Update error:", err);
                }
            }
        }
    </script>
</body>
</html>
